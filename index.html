<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weather App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <div class="card p-4 shadow mx-auto" style="max-width:500px;">

        <h2 class="text-center mb-4">Weather App</h2>

        <div class="input-group">
            <input type="text" id="cityInput" class="form-control" placeholder="Enter City Name">
            <button class="btn btn-primary" onclick="getWeatherData()">Search</button>
        </div>

        <div id="dataResult" class="mt-4"></div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
